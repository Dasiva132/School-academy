<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            margin: 0;
            height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: Arial, Helvetica, sans-serif;
            color: #333;
        }
        body::before{
            content: '';
            position: absolute;
            height: 100%;
            top: 0;
            left: 0;
            background-image:url('./pictures/background-image.png') ;
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            width: 100%;
            filter: blur(8px);
            -webkit-filter: blur(8px);
            z-index: -1;
            transform: scale(1.02);
        }

        .content{
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 50px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

         h1 {
            font-size: 60px;
            margin-bottom: 20px;
        }

        p{
             font-size: 18px;
            line-height: 1.6;
        }

    </style>
    <title>school academy</title>
</head>

    </div>
</body>
</html>
